name: Sync Engine to Elge Repo

on:
  push:
    paths:
      - 'src/elge/**' # Only runs when files in your engine folder change

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Elge Repo
        run: |
          git remote add elge https://x-access-token:${{ secrets.SYNC_TOKEN }}@://github.com
          git subtree push --prefix=src/elge elge main
          
